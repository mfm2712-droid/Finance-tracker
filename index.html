<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finance">
<meta name="theme-color" content="#534AB7">
<title>Finance Tracker 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#FAFAF7;--bg-2:#F1EFE9;--bg-3:#E8E5DD;
--text:#1A1915;--text-2:#6B6960;--text-3:#9C988C;
--border:#E8E5DD;--border-2:#D6D2C7;
--teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#085041;
--coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#712B13;
--purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#26215C;
--blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#042C53;
}
@media (prefers-color-scheme: dark){
:root{
--bg:#1A1915;--bg-2:#252320;--bg-3:#2F2D29;
--text:#FAFAF7;--text-2:#B5B2A8;--text-3:#7C7970;
--border:#2F2D29;--border-2:#3A3833;
--teal-light:#0F3A2C;--coral-light:#3D1A0E;--purple-light:#1D1A4A;--blue-light:#0A2440;
}
}
html,body{background:var(--bg);color:var(--text);min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.app{max-width:1100px;margin:0 auto;padding:1rem 1rem 2rem}
h1{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;display:flex;align-items:center;gap:6px}

.hero{background:var(--bg-2);border-radius:16px;padding:18px;margin-bottom:1rem;border:0.5px solid var(--border)}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.hero-label{font-size:11px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.hero-balance{font-size:34px;font-weight:600;line-height:1;letter-spacing:-0.02em}
.hero-balance.positive{color:var(--teal)}
.hero-balance.danger{color:var(--coral)}

.opening-ctrl{display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--border-2);border-radius:10px;padding:8px 12px}
.opening-ctrl label{font-size:12px;color:var(--text-2);white-space:nowrap}
.opening-ctrl input{width:90px;background:transparent;border:none;outline:none;font-size:15px;font-weight:600;color:var(--text);text-align:right;font-family:inherit}

.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.kpi{border-radius:10px;padding:12px 14px;border:0.5px solid transparent;min-width:0}
.kpi.income{background:var(--teal-light);border-color:#9FE1CB44}
.kpi.expense{background:var(--coral-light);border-color:#F5C4B344}
.kpi.net-pos{background:var(--purple-light);border-color:#CECBF644}
.kpi.net-neg{background:var(--coral-light);border-color:#F5C4B344}
.kpi.bal-pos{background:var(--teal-light);border-color:#9FE1CB44}
.kpi.bal-neg{background:var(--coral-light);border-color:#F5C4B344}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi.income .kpi-label,.kpi.bal-pos .kpi-label{color:var(--teal-dark)}
.kpi.expense .kpi-label,.kpi.net-neg .kpi-label,.kpi.bal-neg .kpi-label{color:var(--coral-dark)}
.kpi.net-pos .kpi-label{color:var(--purple-dark)}
@media (prefers-color-scheme: dark){
.kpi.income .kpi-label,.kpi.bal-pos .kpi-label{color:#5DCAA5}
.kpi.expense .kpi-label,.kpi.net-neg .kpi-label,.kpi.bal-neg .kpi-label{color:#F0997B}
.kpi.net-pos .kpi-label{color:#9F95E8}
}
.kpi-val{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi.income .kpi-val,.kpi.bal-pos .kpi-val{color:var(--teal-dark)}
.kpi.expense .kpi-val,.kpi.net-neg .kpi-val,.kpi.bal-neg .kpi-val{color:var(--coral-dark)}
.kpi.net-pos .kpi-val{color:var(--purple-dark)}
@media (prefers-color-scheme: dark){
.kpi.income .kpi-val,.kpi.bal-pos .kpi-val{color:#5DCAA5}
.kpi.expense .kpi-val,.kpi.net-neg .kpi-val,.kpi.bal-neg .kpi-val{color:#F0997B}
.kpi.net-pos .kpi-val{color:#B5AEED}
}
.kpi-icon{font-size:14px;margin-bottom:4px}

.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:100px;border:0.5px solid var(--border-2);background:transparent;font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit}
.tab.active-mayo{background:#534AB7;color:#EEEDFE;border-color:#534AB7}
.tab.active-junio{background:#1D9E75;color:#E1F5EE;border-color:#1D9E75}
.tab.active-julio{background:#D85A30;color:#FAECE7;border-color:#D85A30}
.tab.active-agosto{background:#BA7517;color:#FAEEDA;border-color:#BA7517}
.tab.active-septiembre{background:#185FA5;color:#E6F1FB;border-color:#185FA5}
.tab.active-octubre{background:#A14080;color:#FAEEF5;border-color:#A14080}
.tab.active-noviembre{background:#3D6E2C;color:#EDF7E5;border-color:#3D6E2C}
.tab.active-diciembre{background:#8B3A3A;color:#FAECEC;border-color:#8B3A3A}
.tab.active-enero{background:#2B6E96;color:#E6F1FB;border-color:#2B6E96}
.view-toggle{display:flex;gap:6px;margin-left:auto}
.view-btn{padding:7px 14px;border-radius:100px;border:0.5px solid var(--border-2);background:transparent;font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit;white-space:nowrap}
.view-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.add-panel{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:1rem}
.add-panel-title{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.add-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:11px;color:var(--text-2)}
.field-group input{padding:8px 10px;border:0.5px solid var(--border-2);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%}
.field-group input:focus{border-color:var(--purple)}
.field-date{min-width:130px;flex:0 0 auto}
.field-desc{flex:1;min-width:130px}
.field-amt{min-width:90px;flex:0 0 auto}
.type-pills{display:flex;border-radius:8px;overflow:hidden;border:0.5px solid var(--border-2)}
.type-pill{padding:8px 12px;border:none;font-size:12px;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--text-2)}
.type-pill.sel-in{background:var(--teal);color:#E1F5EE}
.type-pill.sel-out{background:var(--coral);color:#FAECE7}
.add-btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;background:var(--text);color:var(--bg);white-space:nowrap}

.drag-hint{font-size:11px;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:6px;padding:0 2px}

.tx-list{display:flex;flex-direction:column;gap:4px}
.tx-item{display:grid;grid-template-columns:24px 110px 1fr 88px 96px 32px;align-items:center;gap:6px;border-radius:10px;padding:8px 10px;border:0.5px solid var(--border);background:var(--bg);transition:opacity .15s}
.tx-item.income-row{border-left:3px solid var(--teal)}
.tx-item.expense-row{border-left:3px solid var(--coral)}
.tx-item.dragging{opacity:.35}
.drop-indicator{height:3px;background:var(--purple);border-radius:3px;margin:1px 0}
.drag-handle{cursor:grab;color:var(--text-3);font-size:14px;display:flex;align-items:center;justify-content:center;padding:2px;user-select:none;touch-action:none}
.drag-handle:active{cursor:grabbing}
.tx-date-input{width:100%;background:transparent;border:none;outline:none;font-size:11px;color:var(--text-2);font-family:inherit;padding:0;cursor:pointer;min-width:0}
.tx-desc{display:flex;align-items:center;justify-content:center;padding:0 6px;min-width:0}
.tx-desc input{width:100%;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit;padding:0;text-align:center;text-overflow:ellipsis}
.tx-amt input{width:100%;background:transparent;border:none;outline:none;font-size:13px;font-weight:600;text-align:right;font-family:inherit;padding:0}
.tx-amt input.inc{color:var(--teal)}
.tx-amt input.exp{color:var(--coral)}
.tx-bal{font-size:13px;font-weight:600;text-align:right;padding-right:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-bal.pos{color:var(--teal)}
.tx-bal.neg{color:var(--coral)}
.del-btn{background:transparent;border:none;cursor:pointer;color:var(--text-3);font-size:18px;border-radius:6px;padding:6px;display:flex;align-items:center;justify-content:center;position:relative;z-index:5;min-width:32px;min-height:32px;touch-action:manipulation}
.del-btn:active{background:rgba(216,90,48,0.15);color:var(--coral)}

.chart-panel,.compare-panel{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:1rem}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.compare-title{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.compare-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:10px}
.compare-card{border-radius:10px;padding:12px 14px;border:0.5px solid var(--border);background:var(--bg-2);min-width:0}
.compare-month{font-size:11px;color:var(--text-2);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.compare-bal{font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.compare-bal.pos{color:var(--teal)}
.compare-bal.neg{color:var(--coral)}
.compare-delta{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.delta-up{color:var(--teal)}.delta-down{color:var(--coral)}
.bar-section{margin-top:14px}
.bar-label{font-size:11px;color:var(--text-2);margin-bottom:6px}
.bar-track{background:var(--bg-2);border-radius:6px;height:8px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}

.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}


/* Edit modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border-radius:16px;padding:20px;width:100%;max-width:420px;border:0.5px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,0.25)}
.modal h3{font-size:14px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.modal-row label{font-size:12px;color:var(--text-2)}
.modal-row textarea,.modal-row input{padding:10px 12px;border:0.5px solid var(--border-2);border-radius:10px;background:var(--bg);color:var(--text);font-size:15px;font-family:inherit;outline:none;width:100%;resize:none}
.modal-row textarea{min-height:70px;line-height:1.4}
.modal-row textarea:focus,.modal-row input:focus{border-color:var(--purple)}
.modal-amt-wrap{display:flex;gap:8px;align-items:stretch}
.modal-amt-wrap input{flex:1}
.modal-type-toggle{display:flex;border-radius:10px;overflow:hidden;border:0.5px solid var(--border-2)}
.modal-type-toggle button{padding:0 14px;border:none;font-size:12px;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--text-2);font-weight:500}
.modal-type-toggle button.sel-in{background:var(--teal);color:#E1F5EE}
.modal-type-toggle button.sel-out{background:var(--coral);color:#FAECE7}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-btn{padding:10px 18px;border-radius:10px;border:none;font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}
.modal-btn.cancel{background:transparent;color:var(--text-2);border:0.5px solid var(--border-2)}
.modal-btn.save{background:var(--text);color:var(--bg)}

@media (max-width: 640px){
  .hero{padding:14px;border-radius:14px}
  .hero-balance{font-size:28px}
  .hero-top{margin-bottom:12px}
  .opening-ctrl{padding:6px 10px}
  .opening-ctrl input{width:70px;font-size:14px}
  .kpi-row{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .kpi{padding:10px 12px}
  .kpi-val{font-size:14px}
  .nav-row{gap:6px}
  .tab{padding:6px 12px;font-size:12px}
  .view-toggle{margin-left:0;width:100%;justify-content:flex-start}
  .view-btn{padding:6px 12px;font-size:12px;flex:1;text-align:center}
  .add-panel{padding:12px}
  .add-fields{gap:6px}
  .field-date,.field-amt{flex:1 1 calc(50% - 4px);min-width:0}
  .field-desc{flex:1 1 100%;min-width:0;order:-1}
  .type-pills{flex:1 1 100%}
  .type-pill{flex:1;justify-content:center;display:flex;align-items:center;gap:4px}
  .add-btn{flex:1 1 100%;padding:10px}
  .tx-item{grid-template-columns:24px 1fr auto 32px;grid-template-rows:auto auto;gap:4px 8px;padding:10px 12px}
  .tx-handle-cell{grid-row:1 / span 2;grid-column:1}
  .tx-date-cell{grid-row:1;grid-column:2}
  .tx-desc-cell{grid-row:2;grid-column:2;min-width:0}
  .tx-amt-cell{grid-row:1;grid-column:3;text-align:right}
  .tx-bal-cell{grid-row:2;grid-column:3;text-align:right}
  .tx-del-cell{grid-row:1 / span 2;grid-column:4;align-self:center}
  .tx-desc{justify-content:flex-start;padding:0}
  .tx-desc input{text-align:left;font-size:14px}
  .tx-date-input{font-size:11px}
  .tx-amt input{font-size:14px}
  .tx-bal{font-size:12px}
  .chart-panel,.compare-panel{padding:12px}
  .compare-card{padding:10px 8px}
  .compare-bal{font-size:13px}
  .compare-month{font-size:10px}
  .compare-delta{font-size:10px}
}
</style>
</head>
<body>
<div class="app">
<h1>
  <svg class="icon"><path d="M19 7h-3V6a3 3 0 0 0-3-3h-2a3 3 0 0 0-3 3v1H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM10 6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1h-4z"/></svg>
  Finance Tracker 2026
</h1>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="hero-label">Saldo final estimado <span id="sync-indicator" style="font-size:10px;margin-left:6px;font-weight:400;text-transform:none;letter-spacing:0">⟳ Sincronizando...</span></div>
      <div class="hero-balance positive" id="hero-bal">£0.00</div>
    </div>
    <div class="opening-ctrl">
      <label>Saldo inicial Mayo</label>
      <input type="number" id="opening-input" value="113" step="0.01">
    </div>
  </div>
  <div class="kpi-row" id="kpi-row"></div>
</div>

<div class="nav-row">
  <div class="tabs" id="month-tabs"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-tabla" onclick="setView('tabla')">Tabla</button>
    <button class="view-btn" id="btn-grafica" onclick="setView('grafica')">Gráfica</button>
  </div>
</div>

<div id="view-tabla">
  <div class="add-panel">
    <div class="add-panel-title">+ Añadir movimiento</div>
    <div class="add-fields">
      <div class="field-group field-date">
        <label>Fecha</label>
        <input type="date" id="new-date">
      </div>
      <div class="field-group field-desc">
        <label>Concepto</label>
        <input type="text" id="new-desc" placeholder="Descripción...">
      </div>
      <div class="field-group field-amt">
        <label>Importe (£)</label>
        <input type="number" id="new-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
      <div class="field-group" style="flex:0 0 auto">
        <label>Tipo</label>
        <div class="type-pills">
          <button class="type-pill" id="pill-in" onclick="setType('in')">↑ Ingreso</button>
          <button class="type-pill sel-out" id="pill-out" onclick="setType('out')">↓ Gasto</button>
        </div>
      </div>
      <button class="add-btn" onclick="addRow()">Añadir</button>
    </div>
  </div>
  <div class="drag-hint">⋮⋮ Arrastra por el asa para reordenar. Toca la fecha para cambiarla.</div>
  <div class="tx-list" id="tx-list"></div>
</div>

<div id="view-grafica" style="display:none">
  <div class="chart-panel">
    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot" style="background:#1D9E75"></span>Balance</span>
      <span class="legend-item"><span class="legend-dot" style="background:#5DCAA5;opacity:.7"></span>Ingresos</span>
      <span class="legend-item"><span class="legend-dot" style="background:#F0997B;opacity:.8"></span>Gastos</span>
    </div>
    <div style="position:relative;width:100%;height:260px">
      <canvas id="main-chart"></canvas>
    </div>
  </div>
  <div class="compare-panel">
    <div class="compare-title">↔ Balance vs mes anterior</div>
    <div class="compare-row" id="compare-cards"></div>
    <div class="bar-section" id="bar-section"></div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxeIMVhzqUxTfLEvdeqcf3pb29jKbKFq0",
  authDomain: "finance-tracker-4478d.firebaseapp.com",
  databaseURL: "https://finance-tracker-4478d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "finance-tracker-4478d",
  storageBucket: "finance-tracker-4478d.firebasestorage.app",
  messagingSenderId: "837346395958",
  appId: "1:837346395958:web:0bb3dde3fd032141145597"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const dataRef = ref(db, 'finance/mark');

window.__fb = { db, ref, set, onValue, dataRef, ready: false, lastRemote: null };

let saveTimer = null;
window.cloudSave = function(payload){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    set(dataRef, payload).catch(e=>console.warn('Cloud save error:',e));
  }, 400);
};

// Initial load + live listener
onValue(dataRef, snapshot => {
  const val = snapshot.val();
  window.__fb.lastRemote = val;
  if (val && window.__applyRemoteData) {
    window.__applyRemoteData(val);
  }
  window.__fb.ready = true;
  // Show sync indicator
  const indicator = document.getElementById('sync-indicator');
  if (indicator) {
    indicator.textContent = '✓ Sincronizado';
    indicator.style.color = 'var(--teal)';
  }
}, err => {
  console.warn('Firebase listen error:', err);
  const indicator = document.getElementById('sync-indicator');
  if (indicator) {
    indicator.textContent = '⚠ Sin conexión';
    indicator.style.color = 'var(--coral)';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STORAGE_KEY='finance_tracker_v8';

let data={},mayoOpening=113,activeMonth='mayo',currentType='out',currentView='tabla';
let chartInst=null,dragSrcIdx=null;

function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){
      const p=JSON.parse(s);
      data=p.data||{};
      mayoOpening=p.mayoOpening??113;
      MONTHS.forEach(m=>{if(!data[m])data[m]=RAW_ROWS[m].map((r,i)=>({...r,id:m+'_'+i}));});
      return;
    }
  }catch(e){console.warn('Load fail',e);}
  MONTHS.forEach(m=>{data[m]=RAW_ROWS[m].map((r,i)=>({...r,id:m+'_'+i}));});
}
function saveState(){
  const payload = {data, mayoOpening, ts: Date.now()};
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));}catch(e){console.warn('Save fail',e);}
  if (window.cloudSave) window.cloudSave(payload);
}

// Apply remote data when it arrives or changes
window.__applyRemoteData = function(remote){
  if (!remote || !remote.data) return;
  // Only update if remote is newer than what we have or we have nothing
  const localRaw = localStorage.getItem(STORAGE_KEY);
  let localTs = 0;
  if (localRaw) {
    try { localTs = JSON.parse(localRaw).ts || 0; } catch(e){}
  }
  const remoteTs = remote.ts || 0;
  if (remoteTs >= localTs) {
    data = remote.data;
    mayoOpening = remote.mayoOpening ?? mayoOpening;
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(remote));}catch(e){}
    if (typeof render === 'function') render();
  }
};

function isMobile(){return window.innerWidth<=640;}
function getOpening(m){
  if(m==='mayo')return mayoOpening;
  const prev=MONTHS[MONTHS.indexOf(m)-1];
  const rows=computeBalances(prev);
  return rows.length?rows[rows.length-1].balance:0;
}
function computeBalances(m){
  let bal=getOpening(m);
  return data[m].map(r=>{bal=Math.round((bal+r.amt)*100)/100;return{...r,balance:bal};});
}
function getClosing(m){const rows=computeBalances(m);return rows.length?rows[rows.length-1].balance:getOpening(m);}
function fmt(n){return(n<0?'-':'')+'£'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtShort(n){const a=Math.abs(n);if(a>=1000)return(n<0?'-':'')+'£'+(a/1000).toFixed(1)+'k';return fmt(n);}

function setType(t){
  currentType=t;
  document.getElementById('pill-in').className='type-pill'+(t==='in'?' sel-in':'');
  document.getElementById('pill-out').className='type-pill'+(t==='out'?' sel-out':'');
}
function setView(v){
  currentView=v;
  document.getElementById('view-tabla').style.display=v==='tabla'?'':'none';
  document.getElementById('view-grafica').style.display=v==='grafica'?'':'none';
  document.getElementById('btn-tabla').className='view-btn'+(v==='tabla'?' active':'');
  document.getElementById('btn-grafica').className='view-btn'+(v==='grafica'?' active':'');
  if(v==='grafica')renderChart();
}
function renderTabs(){
  const c=document.getElementById('month-tabs');c.innerHTML='';
  MONTHS.forEach(m=>{
    const b=document.createElement('button');
    b.className='tab'+(m===activeMonth?' '+TAB_CLASS[m]:'');
    b.textContent=LABELS[m];
    b.onclick=()=>{activeMonth=m;render();};
    c.appendChild(b);
  });
}
function renderHero(){
  const rows=computeBalances(activeMonth);
  const closing=rows.length?rows[rows.length-1].balance:getOpening(activeMonth);
  const income=rows.filter(r=>r.amt>0).reduce((s,r)=>s+r.amt,0);
  const expenses=rows.filter(r=>r.amt<0).reduce((s,r)=>s+r.amt,0);
  const net=income+expenses;
  document.getElementById('hero-bal').textContent=fmt(closing);
  document.getElementById('hero-bal').className='hero-balance '+(closing>=0?'positive':'danger');
  document.getElementById('opening-input').style.display=activeMonth==='mayo'?'':'none';
  document.querySelector('.opening-ctrl label').style.display=activeMonth==='mayo'?'':'none';
  const f=isMobile()?fmtShort:fmt;
  const balCls=closing>=0?'bal-pos':'bal-neg';
  const netCls=net>=0?'net-pos':'net-neg';
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi income"><div class="kpi-label">↑ Ingresos</div><div class="kpi-val">${f(income)}</div></div>
    <div class="kpi expense"><div class="kpi-label">↓ Gastos</div><div class="kpi-val">${f(expenses)}</div></div>
    <div class="kpi ${netCls}"><div class="kpi-label">${net>=0?'↗':'↘'} Resultado</div><div class="kpi-val">${f(net)}</div></div>
    <div class="kpi ${balCls}"><div class="kpi-label">${closing>=0?'●':'⚠'} Saldo final</div><div class="kpi-val">${f(closing)}</div></div>
  `;
}

  const arr=data[activeMonth];
  const container=document.getElementById('tx-list');
  container.innerHTML='';
  const mob=isMobile();

  arr.forEach((row,idx)=>{
    const el=document.createElement('div');
    el.className='tx-item '+(row.amt>=0?'income-row':'expense-row');
    el.dataset.idx=idx;
    el.draggable=!mob;

    const safeDesc=row.desc.replace(/"/g,'&quot;').replace(/'/g,"&#39;");
    if(mob){
      el.innerHTML=`
        <div class="drag-handle tx-handle-cell">⋮⋮</div>
        <div class="tx-date-cell"><input class="tx-date-input" type="date" value="${row.date}" onclick="event.stopPropagation()" onchange="updateDate('${row.id}',this.value)"></div>
        <div class="tx-desc tx-desc-cell" onclick="openEditModal('${row.id}')" style="cursor:pointer"><input value="${safeDesc}" readonly style="cursor:pointer;pointer-events:none"></div>
        <div class="tx-amt tx-amt-cell" onclick="openEditModal('${row.id}')" style="cursor:pointer"><input class="${row.amt>=0?'inc':'exp'}" value="${(row.amt>=0?'+':'')+row.amt.toFixed(2)}" readonly style="cursor:pointer;pointer-events:none"></div>
        <div class="tx-bal tx-bal-cell" id="bal-${row.id}">—</div>
        <button class="del-btn tx-del-cell" ontouchend="event.stopPropagation();event.preventDefault();deleteRow('${row.id}')" onclick="event.stopPropagation();deleteRow('${row.id}')" aria-label="Eliminar">🗑</button>`;
    } else {
      el.innerHTML=`
        <div class="drag-handle">⋮⋮</div>
        <div style="display:flex;align-items:center;min-width:0">
          <input class="tx-date-input" type="date" value="${row.date}" onclick="event.stopPropagation()" onchange="updateDate('${row.id}',this.value)">
        </div>
        <div class="tx-desc"><input value="${safeDesc}" onchange="updateField('${row.id}','desc',this.value)"></div>
        <div class="tx-amt"><input class="${row.amt>=0?'inc':'exp'}" inputmode="decimal" value="${(row.amt>=0?'+':'')+row.amt.toFixed(2)}" onchange="updateAmt('${row.id}',this.value)" onblur="render()"></div>
        <div class="tx-bal" id="bal-${row.id}">—</div>
        <button class="del-btn" onclick="event.stopPropagation();deleteRow('${row.id}')" aria-label="Eliminar">🗑</button>`;
    }

    if(!mob){
      el.addEventListener('dragstart',e=>{
        dragSrcIdx=idx;
        setTimeout(()=>el.classList.add('dragging'),0);
        e.dataTransfer.effectAllowed='move';
      });
      el.addEventListener('dragend',()=>{
        el.classList.remove('dragging');
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
      });
      el.addEventListener('dragover',e=>{
        e.preventDefault();
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
        if(idx===dragSrcIdx)return;
        const ind=document.createElement('div');
        ind.className='drop-indicator';
        const rect=el.getBoundingClientRect();
        e.clientY<rect.top+rect.height/2?container.insertBefore(ind,el):el.insertAdjacentElement('afterend',ind);
      });
      el.addEventListener('dragleave',e=>{if(!el.contains(e.relatedTarget)) document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());});
      el.addEventListener('drop',e=>{
        e.preventDefault();
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
        if(dragSrcIdx===null||dragSrcIdx===idx)return;
        const a=data[activeMonth];
        const srcItem=a[dragSrcIdx];
        const tgtItem=a[idx];
        const rect=el.getBoundingClientRect();
        const insertBefore=e.clientY<rect.top+rect.height/2;
        a.splice(dragSrcIdx,1);
        const newTgt=a.indexOf(tgtItem);
        a.splice(insertBefore?newTgt:newTgt+1,0,srcItem);
        srcItem.date=tgtItem.date;
        dragSrcIdx=null;
        saveState();render();
      });
    } else {
      // Touch drag ONLY on the handle. Threshold prevents tap from triggering drag.
      const handle=el.querySelector('.drag-handle');
      let touchStartY=0,dragStarted=false,longPressTimer=null;
      handle.addEventListener('touchstart',e=>{
        touchStartY=e.touches[0].clientY;
        dragStarted=false;
        longPressTimer=setTimeout(()=>{
          dragStarted=true;
          dragSrcIdx=idx;
          el.classList.add('dragging');
          if(navigator.vibrate)navigator.vibrate(40);
        },180);
      },{passive:true});
      handle.addEventListener('touchmove',e=>{
        if(!dragStarted){
          // not yet a drag — cancel long press if user is just scrolling
          if(Math.abs(e.touches[0].clientY-touchStartY)>10){
            clearTimeout(longPressTimer);
          }
          return;
        }
        e.preventDefault();
        const t=e.touches[0];
        const items=[...container.querySelectorAll('.tx-item')];
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
        for(const it of items){
          if(it===el)continue;
          const r=it.getBoundingClientRect();
          if(t.clientY>=r.top&&t.clientY<=r.bottom){
            const ind=document.createElement('div');
            ind.className='drop-indicator';
            t.clientY<r.top+r.height/2?container.insertBefore(ind,it):it.insertAdjacentElement('afterend',ind);
            break;
          }
        }
      },{passive:false});
      handle.addEventListener('touchend',e=>{
        clearTimeout(longPressTimer);
        if(!dragStarted){
          dragSrcIdx=null;
          return;
        }
        el.classList.remove('dragging');
        const indicator=container.querySelector('.drop-indicator');
        if(indicator&&dragSrcIdx!==null){
          const next=indicator.nextElementSibling;
          const prev=indicator.previousElementSibling;
          let tgtEl=next&&next.classList.contains('tx-item')?next:prev;
          let insertBefore=next&&next.classList.contains('tx-item');
          if(tgtEl&&tgtEl.classList.contains('tx-item')&&tgtEl!==el){
            const tgtIdx=parseInt(tgtEl.dataset.idx);
            const a=data[activeMonth];
            const srcItem=a[dragSrcIdx];
            const tgtItem=a[tgtIdx];
            a.splice(dragSrcIdx,1);
            const newTgt=a.indexOf(tgtItem);
            a.splice(insertBefore?newTgt:newTgt+1,0,srcItem);
            srcItem.date=tgtItem.date;
            saveState();
          }
        }
        dragSrcIdx=null;
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
        render();
      });
      handle.addEventListener('touchcancel',()=>{
        clearTimeout(longPressTimer);
        dragStarted=false;
        dragSrcIdx=null;
        el.classList.remove('dragging');
        document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
      });
    }
    container.appendChild(el);
  });

  const balances=computeBalances(activeMonth);
  balances.forEach(row=>{
    const el=document.getElementById('bal-'+row.id);
    if(el){el.textContent=isMobile()?fmtShort(row.balance):fmt(row.balance);el.className='tx-bal '+(isMobile()?'tx-bal-cell ':'')+(row.balance>=0?'pos':'neg');}
  });
}

// === Edit modal logic ===
let modalEditingId=null,modalType='out',pendingDeleteId=null;
function setModalType(t){
  modalType=t;
  document.getElementById('modal-pill-in').className=t==='in'?'sel-in':'';
  document.getElementById('modal-pill-out').className=t==='out'?'sel-out':'';
}
function openEditModal(id){
  const m=id.split('_')[0];
  const row=data[m].find(r=>r.id===id);
  if(!row)return;
  modalEditingId=id;
  document.getElementById('modal-desc').value=row.desc;
  document.getElementById('modal-amt').value=Math.abs(row.amt).toFixed(2);
  setModalType(row.amt>=0?'in':'out');
  document.getElementById('edit-modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-desc').focus(),100);
}
function closeEditModal(){
  document.getElementById('edit-modal').classList.remove('open');
  modalEditingId=null;
}
function saveEditModal(){
  if(!modalEditingId)return;
  const m=modalEditingId.split('_')[0];
  const row=data[m].find(r=>r.id===modalEditingId);
  if(!row)return;
  const newDesc=document.getElementById('modal-desc').value.trim()||'Sin descripción';
  const newAmtRaw=parseFloat(document.getElementById('modal-amt').value);
  if(isNaN(newAmtRaw)){alert('Importe no válido');return;}
  row.desc=newDesc;
  row.amt=modalType==='out'?-Math.abs(newAmtRaw):Math.abs(newAmtRaw);
  saveState();
  closeEditModal();
  render();
}

function updateDate(id,val){const m=id.split('_')[0];const row=data[m].find(r=>r.id===id);if(row&&val){row.date=val;saveState();render();}}
function updateField(id,field,val){const m=id.split('_')[0];const row=data[m].find(r=>r.id===id);if(row){row[field]=val;saveState();renderHero();}}
function updateAmt(id,val){const m=id.split('_')[0];const row=data[m].find(r=>r.id===id);if(row){const n=parseFloat(val);if(!isNaN(n)){row.amt=n;saveState();}}}
function deleteRow(id){
  pendingDeleteId=id;
  const m=id.split('_')[0];
  const row=data[m].find(r=>r.id===id);
  if(!row)return;
  document.getElementById('confirm-text').textContent=row.desc.length>40?row.desc.substring(0,40)+'...':row.desc;
  document.getElementById('confirm-modal').classList.add('open');
}
function confirmDelete(){
  if(!pendingDeleteId)return;
  const m=pendingDeleteId.split('_')[0];
  data[m]=data[m].filter(r=>r.id!==pendingDeleteId);
  pendingDeleteId=null;
  document.getElementById('confirm-modal').classList.remove('open');
  saveState();render();
}
function cancelDelete(){
  pendingDeleteId=null;
  document.getElementById('confirm-modal').classList.remove('open');
}
function addRow(){
  const dateVal=document.getElementById('new-date').value;
  const desc=document.getElementById('new-desc').value.trim()||'Sin descripción';
  const amt=parseFloat(document.getElementById('new-amt').value)||0;
  const signed=currentType==='out'?-Math.abs(amt):Math.abs(amt);
  const id=activeMonth+'_'+Date.now();
  data[activeMonth].push({date:dateVal||'',desc,amt:signed,id});
  data[activeMonth].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('new-date').value='';
  document.getElementById('new-desc').value='';
  document.getElementById('new-amt').value='';
  saveState();render();
}

function renderChart(){
  const rows=computeBalances(activeMonth);
  const byDate={};
  rows.forEach(r=>{
    if(!byDate[r.date])byDate[r.date]={income:0,expense:0,balance:r.balance};
    else byDate[r.date].balance=r.balance;
    if(r.amt>0)byDate[r.date].income+=r.amt;
    else byDate[r.date].expense+=Math.abs(r.amt);
  });
  const dates=Object.keys(byDate).sort();
  const labels=dates.map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  const balData=dates.map(d=>byDate[d].balance);
  const incData=dates.map(d=>byDate[d].income);
  const expData=dates.map(d=>byDate[d].expense);
  if(chartInst){chartInst.destroy();chartInst=null;}
  const ctx=document.getElementById('main-chart').getContext('2d');
  chartInst=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {type:'line',label:'Balance',data:balData,borderColor:'#1D9E75',backgroundColor:'transparent',borderWidth:2,pointBackgroundColor:'#1D9E75',pointRadius:isMobile()?2:3,tension:.3,yAxisID:'y',order:1},
    {type:'bar',label:'Ingresos',data:incData,backgroundColor:'rgba(93,202,165,0.55)',borderColor:'rgba(93,202,165,0.8)',borderWidth:1,yAxisID:'y2',order:2},
    {type:'bar',label:'Gastos',data:expData,backgroundColor:'rgba(240,153,123,0.6)',borderColor:'rgba(216,90,48,0.6)',borderWidth:1,yAxisID:'y2',order:3}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},scales:{x:{ticks:{font:{size:isMobile()?9:11},maxRotation:45,autoSkip:true,maxTicksLimit:isMobile()?7:12},grid:{display:false}},y:{position:'left',ticks:{font:{size:isMobile()?9:11},callback:v=>fmtShort(v)},grid:{color:'rgba(128,128,128,0.1)'}},y2:{position:'right',ticks:{font:{size:isMobile()?9:11},callback:v=>fmtShort(v)},grid:{display:false}}}}});
  renderCompare();
}
function renderCompare(){
  const closings=MONTHS.map(m=>getClosing(m));
  const incomes=MONTHS.map(m=>computeBalances(m).filter(r=>r.amt>0).reduce((s,r)=>s+r.amt,0));
  const expenses=MONTHS.map(m=>computeBalances(m).filter(r=>r.amt<0).reduce((s,r)=>s+r.amt,0));
  const cards=document.getElementById('compare-cards');cards.innerHTML='';
  const f=isMobile()?fmtShort:fmt;
  MONTHS.forEach((m,i)=>{
    const bal=closings[i];const prev=i>0?closings[i-1]:mayoOpening;const delta=bal-prev;
    const dc=delta>=0?'delta-up':'delta-down';const arrow=delta>=0?'↑':'↓';
    const card=document.createElement('div');card.className='compare-card';
    card.style.border=m===activeMonth?`1.5px solid ${MONTH_COLORS[m]}`:'';
    card.innerHTML=`<div class="compare-month"><span style="width:8px;height:8px;border-radius:50%;background:${MONTH_COLORS[m]};display:inline-block"></span>${LABELS[m]}</div><div class="compare-bal ${bal>=0?'pos':'neg'}">${f(bal)}</div><div class="compare-delta ${dc}">${arrow} ${i===0?'Inicial':f(Math.abs(delta))}</div>`;
    cards.appendChild(card);
  });
  const bars=document.getElementById('bar-section');bars.innerHTML='';
  const maxInc=Math.max(...incomes,1);const maxExp=Math.max(...expenses.map(Math.abs),1);const maxBal=Math.max(...closings.map(Math.abs),1);
  [{label:'Ingresos por mes',data:incomes,color:'#1D9E75',max:maxInc},{label:'Gastos por mes',data:expenses.map(Math.abs),color:'#D85A30',max:maxExp},{label:'Saldo final por mes',data:closings,color:'#534AB7',max:maxBal,signed:true}].forEach(s=>{
    const div=document.createElement('div');div.innerHTML=`<div class="bar-label">${s.label}</div>`;
    MONTHS.forEach((m,i)=>{
      const val=s.data[i];const pct=Math.abs(val)/s.max*100;const color=s.signed?(val>=0?'#1D9E75':'#D85A30'):s.color;
      div.innerHTML+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:11px;color:var(--text-2);width:40px">${LABELS[m]}</span><div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:12px;font-weight:600;color:${color};min-width:60px;text-align:right">${f(val)}</span></div>`;
    });
    bars.appendChild(div);
  });
}
function render(){
  renderTabs();renderHero();
  if(currentView==='tabla')renderList();
  else renderChart();
}
document.addEventListener('change',e=>{
  if(e.target&&e.target.id==='opening-input'){const v=parseFloat(e.target.value);if(!isNaN(v)){mayoOpening=v;saveState();render();}}
});
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{if(currentView==='tabla')renderList();else if(chartInst)renderChart();renderHero();},150);
});

loadState();
const today=new Date();
document.getElementById('new-date').value=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
setType('out');
render();
</script>

<div class="modal-backdrop" id="edit-modal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modal-title">✎ Editar movimiento</h3>
    <div class="modal-row">
      <label>Concepto</label>
      <textarea id="modal-desc" rows="2"></textarea>
    </div>
    <div class="modal-row">
      <label>Importe (£)</label>
      <div class="modal-amt-wrap">
        <input type="number" id="modal-amt" step="0.01" inputmode="decimal">
        <div class="modal-type-toggle">
          <button id="modal-pill-in" onclick="setModalType('in')">↑ Ingreso</button>
          <button id="modal-pill-out" onclick="setModalType('out')">↓ Gasto</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeEditModal()">Cancelar</button>
      <button class="modal-btn save" onclick="saveEditModal()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="confirm-modal" onclick="if(event.target===this)cancelDelete()">
  <div class="modal" role="alertdialog" aria-modal="true" style="max-width:340px">
    <h3 style="color:var(--coral)">🗑 ¿Eliminar movimiento?</h3>
    <p style="font-size:14px;color:var(--text);margin-bottom:6px" id="confirm-text"></p>
    <p style="font-size:12px;color:var(--text-2);margin-bottom:14px">Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="cancelDelete()">Cancelar</button>
      <button class="modal-btn" onclick="confirmDelete()" style="background:var(--coral);color:#FAECE7">Eliminar</button>
    </div>
  </div>
</div>

</body>
</html>
